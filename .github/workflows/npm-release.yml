name: npm Release

on:
  push:
    tags:
      - "web-v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: npm install --global npm@11.5.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:web
      - run: pnpm test:web
      - name: Verify tag version
        shell: bash
        run: |
          version=$(node --print "require('./packages/web/package.json').version")
          test "$GITHUB_REF_NAME" = "web-v$version"
      - name: Publish public alpha
        working-directory: packages/web
        run: npm publish --access public --tag alpha
