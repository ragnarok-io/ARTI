name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: uv run --extra dev pytest
      - run: uv build

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: uv sync --extra dev
      - run: pnpm install --frozen-lockfile
      - run: uv run python scripts/generate_web_contract.py packages/web/src/generated/contract.ts
      - run: git diff --exit-code -- packages/web/src/generated/contract.ts
      - run: uv run python scripts/generate_web_fixtures.py .tmp/web-fixtures
      - run: pnpm build:web
      - run: pnpm test:web
      - run: pnpm docs:web
